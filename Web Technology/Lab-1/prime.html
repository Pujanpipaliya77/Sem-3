<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var a = parseInt(prompt("give me a number"));
        var flag = false;

        for (i = 2; i <= a/2; i++) {
            if (a % i == 0) {
                flag = true;
                break;
            }
        }
        if (flag == true) {
            console.log("not prime");
        }
        else {
            console.log("prime");
        }



    </script>

</body>

</html>
