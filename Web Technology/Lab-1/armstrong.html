<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //armstrong number 
        let n = (prompt("enter a number:"));
        let l = n.length;
        var a=n;
        var sum=0;


        while(n!=0){
            var temp = n%10;
            sum=sum+Math.pow(temp,l);
            n=parseInt(n/10);
        }
        if(sum==a){
            console.log("number is armstrong")
        }
        else{
            console.log("number is not armstrong")
        }
    </script>
    
</body>
</html>
