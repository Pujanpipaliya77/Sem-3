<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    
    var a = parseInt(prompt("give me a number"));
    var n = 0;

    while(a!=0){
        var temp = a%10;
        var sum = a*10 + temp;
        sum = parseInt(sum/10)
    }
    if(sum==n){
        console.log("number is palindrome");
    }
    else{
        console.log("number is not palindrome");
    }
    </script>
    
</body>
</html>
