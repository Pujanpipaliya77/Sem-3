<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let a = parseInt(prompt("enter the size for array: "));
        let arr = [];
        for (let i = 0; i < a; i++) {
            arr[i] = parseInt(prompt("enter the value for array: "));
        }

        arr.sort(function (a, b) {
            return a - b;
        });
        console.log(arr);

    </script>
</body>

</html>
