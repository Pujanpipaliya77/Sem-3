<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let a = parseInt(prompt("enter the size for array: "));
    let arr = [];
    for (let i = 0; i < a; i++) {
        arr[i] = parseInt(prompt("enter the value for array: " ));
    }

    max = arr[0];
    for (let i = 0; i < arr.length; i++) {
        if (arr[i] > max){
            max = arr[i];
        }
    }
    console.log(max);
    </script>
    
</body>
</html>
