<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        let a = parseInt(prompt("enter a number:"));

        for (var i = 1; i = a; i++) {
            
                for (var j = 1; j = a; j++) {
                    document.write("*");
                }
                document.write("<br>");
            }
    </script>

</body>

</html>
