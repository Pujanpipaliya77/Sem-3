<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style type="text/css">


        .box-1{
            position: absolute;
            animation-name: demo-1;
            height: 200px;
            width: 200px;
            background-color: brown;
            text-align: center;
            animation-delay: 1s;
            animation-duration: 2s;
            animation-direction: alternate;
            animation-timing-function: ease-in;
        }

        .box-2{
            position: absolute;
            animation-name: demo-2;
            height: 250px;
            width: 250px;
            background-color: black;
            text-align: center;
            animation-delay: 1s;
            animation-duration: 3s;
            animation-direction: alternate;
            animation-timing-function: ease-out;
        }


        @keyframes demo{

            0%{ background-color: brown;top: 0%;left: 0%;}
            25%{ background-color: antiquewhite;top: 0%;left:calc(100% - 200px); }
            50%{ background-color: blue; top: 100%; left: calc(100% - 200px);}
            75%{ background-color: aquamarine; top: 100%; left: 0%;}
            100%{background-color: brown; top: 0%; left: 0%; }
            from{
                background-color: brown;
            }
            to{
                background-color: yellow;
            }
        }

        @keyframes demo-2{

            0%{ top: 0px; left: 100px;}
            20%{ top: 450px; left: calc(500px - 200px);}
            40%{ top: 700px; left: calc(250px - 200px);}
            60%{ top: 500px ; left: calc(750px - 200px);}
            80%{ top: 750px; left: calc(500px - 200px);}
            100%{ top: 0px; left: 100px;}

            from{
                background-color: black;
            }
            to{
                background-color: aliceblue;
            }
        }
    </style>
</head>
<body>
    <div class="box-1"></div>
    <div class="box-2"></div>
</body>
</html>
