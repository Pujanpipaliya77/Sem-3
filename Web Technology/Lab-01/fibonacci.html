<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
         //fibonacci number
        var a = parseInt(prompt("give me a number"));
        var b = 0;
        var c = 1;
        var next = b + c;
        
        for (i = 3; i <= a; ++i){
            console.log(next);
            b = c;
            c = next;
            next = b + c;
        }
     </script>
</body>

</html>
