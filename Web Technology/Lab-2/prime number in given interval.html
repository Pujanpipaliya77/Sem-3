<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var smallest = parseInt(prompt("Enter starting number: "));
        var biggest = parseInt(prompt("Enter ending number: "));

        console.log("The prime numbers between smallest and biggest are:");

        for (var i = smallest; i <= biggest; i++) {
            var flag = 0;

            for (var j = 2; j < i; j++) {
                if (i % j == 0) {
                    flag = 1;
                    break;
                }
            }

            if (i > 1 && flag == 0) {
                console.log(i);
            }
        }
    </script>

</body>

</html>
